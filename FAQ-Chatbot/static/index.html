<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watson Chatbot</title>
  <style>
    /* Stellen sicher, dass der Body die volle Bildschirmhöhe hat */
    body, html {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;  /* Horizontale Zentrierung */
      align-items: center;      /* Vertikale Zentrierung */
      background-color: #f5f5f5; /* Hintergrundfarbe der Seite */
      flex-direction: column;   /* Logo und Chatbot untereinander anordnen */
    }

    /* Container für das Firmenlogo */
    #logo-container {
      text-align: center;
      margin-bottom: 30px;  /* Abstand zwischen Logo und Chatbot */
    }

    /* Logo-Stil (optional: Skalierung) */
    #logo {
      max-width: 300px;  /* Maximale Breite des Logos */
      max-height: 300px; /* Maximale Höhe des Logos */
      object-fit: contain; /* Verhindert Verzerrung des Logos */
    }
  </style>
</head>
<body>

  <!-- Container für das Firmenlogo -->
  <div id="logo-container">
    <img id="logo" src="/static/logo.png" />
  </div>

  <script>
    // Watson Assistant Optionen setzen
    window.watsonAssistantChatOptions = {
      integrationID: "810d44ce-4e8c-40b9-b15a-514aa6d8eed0", // Die ID deiner Integration
      region: "eu-de", // Region deines Service
      serviceInstanceID: "eba3dd6d-ed55-44cd-bdbd-c3b4fbeb9bd2", // ID deiner Service Instanz
      onLoad: async (instance) => {
        await instance.render(); // Chatbot Fenster rendern, wenn es geladen ist
      }
    };

    // Script für das Watson Chatbot Widget sofort laden
    const script = document.createElement('script');
    script.id = 'watsonChatScript'; // Wir fügen eine ID hinzu, um doppelte Einbindungen zu vermeiden
    script.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
                 (window.watsonAssistantChatOptions.clientVersion || 'latest') +
                 "/WatsonAssistantChatEntry.js";
    document.head.appendChild(script);
  </script>

</body>
</html>
